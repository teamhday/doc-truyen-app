name: Build iOS IPA

on: [push]

jobs:

  build:

    runs-on: macos-latest

    steps:

      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'

      - run: flutter pub get
      - run: flutter build ipa --release --no-codesign
